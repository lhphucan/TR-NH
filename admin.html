<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Quản Trị - PHOTONOIR</title>
    <link rel="icon" href="./logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f5; margin: 0; padding: 16px; color: #111; box-sizing: border-box;}
        #login-screen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px;}
        .admin-box { max-width: 1000px; margin: auto; display: none; padding-top: 16px; padding-bottom: 60px; }
        
        .toolbar-wrapper { position: sticky; top: 0; z-index: 100; background: #f4f4f5; padding: 12px 0; margin-bottom: 16px; }
        .toolbar { display: flex; gap: 12px; background: #fff; padding: 12px; border-radius: 16px; border: 1px solid #e5e5e5; flex-wrap: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.03); align-items: center;}
        
        @media (max-width: 767px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .admin-only.actions { width: 100%; justify-content: space-between; }
        }

        .client-card { background: #fff; border-radius: 20px; border: 1px solid #e5e5e5; padding: 20px; margin-bottom: 16px; display: flex; gap: 20px; flex-direction: row; transition: all 0.2s ease;}
        .client-card:hover { border-color: #d4d4d8; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        @media (max-width: 767px) { .client-card { flex-direction: column; gap: 16px; padding: 16px; } }
        
        h2 { letter-spacing: 0.5px; font-size: 18px; font-weight: 700; margin: 0;}
        .stt-circle { background: #111; color: #fff; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: monospace; font-size: 20px; flex-shrink: 0;}
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center;}
        .badge.pending { background: #fafafa; color: #666; border: 1px dashed #d4d4d8; }
        .badge.done { background: #111; color: #fff; }
        
        textarea { width: 100%; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; font-family: 'Inter'; font-size: 14px; outline: none; background: #fafafa; transition: 0.2s; resize: none; min-height: 50px; box-sizing: border-box;}
        input[type="text"], input[type="date"], input[type="password"] { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; font-family: 'Inter'; font-size: 14px; outline: none; background: #fafafa; transition: 0.2s; box-sizing: border-box;}
        textarea:focus, input:focus { border-color: #111; background: #fff;}
        
        /* Chỉnh sửa CSS Giá tiền */
        .price-input { padding: 6px 10px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 12px; font-weight: 600; font-family: 'Inter'; outline: none; background: #fff; width: 110px; transition: 0.2s; color: #111; box-sizing: border-box;}
        .price-input:focus { border-color: #111; box-shadow: 0 0 0 2px rgba(17,17,17,0.05); }
        
        .btn-add { background: #111; color: #fff; border: 1px solid #111; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; gap: 8px; justify-content: center; white-space: nowrap;}
        .btn-add:hover:not(:disabled) { background: #fff; color: #111; }
        .btn-add:active:not(:disabled) { transform: scale(0.98); }
        .btn-outline { background: #fff; color: #111; border: 1px solid #d4d4d8; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; white-space: nowrap;}
        .btn-outline:hover { border-color: #111; background: #fafafa;}
        
        .link-row { display: flex; align-items: center; gap: 12px; background: #fafafa; padding: 10px 12px; border-radius: 10px; margin-top: 10px; border: 1px solid #e5e5e5; flex-wrap: wrap;}
        .link-row input { flex-grow: 1; padding: 10px 14px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 13px; background: #fff; min-width: 150px;}
        
        .admin-only { display: flex; gap: 12px; flex-wrap: wrap;}
        body.role-staff .admin-only { display: none !important; }
        
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px;}
        .tab-btn { padding: 14px 24px; border: 1px solid #e5e5e5; border-radius: 12px; cursor: pointer; background: #fff; font-weight: 600; font-size: 14px; color: #666; transition: 0.2s; white-space: nowrap;}
        .tab-btn:hover { border-color: #ccc; color: #111;}
        .tab-btn.active { background: #111; color: #fff; border-color: #111; }
        
        .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sm { width: 14px; height: 14px; vertical-align: middle; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 2px;}
        
        #empty-msg { text-align: center; padding: 80px 24px; display: none; background: #fff; border-radius: 20px; border: 1px dashed #ccc; margin-top: 24px; }
        .trash-notice { background: #111; color: #fff; padding: 16px 24px; border-radius: 16px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;}
        
        /* Custom File Input */
        .file-wrapper { display: flex; align-items: center; gap: 12px; flex-grow: 1; border: 1px dashed #d4d4d8; border-radius: 10px; padding: 8px 12px; background: #fafafa; }
        .file-label { cursor: pointer; background: #fff; border: 1px solid #d4d4d8; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #111; transition: 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap;}
        .file-label:hover { border-color: #111; }
        .file-name { font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; font-weight: 500;}
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 24px; animation: fadeIn 0.2s; }
        .modal-content { background: #fff; padding: 32px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 24px 48px rgba(0,0,0,0.2); box-sizing: border-box;}
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Header alignments */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .client-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 10px;}
        .client-name-box { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .client-name { margin: 0; font-size: 16px; font-weight: 700;}
        .client-id { font-size: 12px; color: #666; font-family: monospace; font-weight: 600; border: 1px solid #e5e5e5; padding: 4px 8px; border-radius: 6px; background: #fafafa;}
    </style>
</head>
<body>
    <div id="login-screen">
        <div style="text-align:center; width: 100%; max-width: 320px;">
            <h3 style="letter-spacing: 2px; font-weight: 800; font-size: 24px; margin-bottom: 8px;">PHOTONOIR</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 32px; font-weight: 500;">HỆ THỐNG QUẢN TRỊ</p>
            <input type="password" id="pass" placeholder="Mã bảo mật" onkeypress="if(event.key==='Enter') login()" style="padding:16px; border-radius:12px; text-align:center; width: 100%; margin-bottom: 16px; font-size: 15px;">
            <button onclick="login()" class="btn-add" style="width: 100%; padding:16px; font-size: 14px;">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div class="admin-box" id="admin-box">
        <div class="header-top">
            <h2 id="role-title">QUẢN LÝ</h2>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <div class="admin-only actions">
                    <button class="btn-outline" onclick="openRevenueModal()" style="border-color: #111; color: #111;">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        Doanh thu
                    </button>
                    <button class="btn-outline" onclick="toggleTrash()" id="btn-trash">
                        <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Thùng rác
                    </button>
                    <button class="btn-outline" onclick="clearData()">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        Dọn dữ liệu
                    </button>
                </div>
                <button class="btn-outline" style="background:#f4f4f5; border-color: transparent;" onclick="logout()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Đăng xuất
                </button>
            </div>
        </div>
        
        <div class="tabs">
            <button onclick="switchB('phucyen')" class="tab-btn active" id="btn-phucyen">Phúc Yên</button>
            <button onclick="switchB('vinhyen')" class="tab-btn" id="btn-vinhyen">Vĩnh Yên</button>
        </div>

        <div class="toolbar-wrapper">
            <div class="toolbar">
                <div style="display: flex; align-items: center; width: 100%; md:width: auto; gap: 10px; border-right: 1px solid #e4e4e7; padding-right: 15px;">
                    <span class="toolbar-label">Ngày xem:</span>
                    <input type="date" id="date-filter" class="search-box" style="cursor: pointer; flex-grow: 0; margin-bottom: 0;" onchange="filterData()">
                    <button onclick="clearDateFilter()" style="background: none; border: none; font-size: 12px; color: #111; text-decoration: underline; cursor: pointer; font-weight: 600; white-space: nowrap; padding: 5px;">Tất cả</button>
                </div>
                <input type="text" id="search-box" class="search-box" style="border: none; background: #f4f4f5; margin-bottom: 0;" placeholder="Tìm kiếm Tên, SĐT, Mã KH..." onkeyup="filterData()">
                <button class="btn-excel admin-only" style="margin-bottom: 0;" onclick="exportExcel()">XUẤT EXCEL</button>
            </div>
        </div>

        <div id="trash-header" style="display: none;"></div>

        <datalist id="price-list">
            <option value="Miễn phí"></option>
        </datalist>

        <div id="list-content"></div>
        
        <div id="empty-msg">
            <svg class="icon" viewBox="0 0 24 24" style="width:56px; height:56px; stroke:#d4d4d8; margin-bottom:16px;"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
            <br><b style="color:#71717a; font-size: 15px;">Không có dữ liệu.</b>
        </div>
    </div>

    <div id="clear-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#111; font-size: 18px; margin-bottom: 16px; display:flex; align-items:center; gap: 8px;">
                <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> DỌN DẸP DỮ LIỆU
            </h3>
            <p style="font-size:14px; color:#666; margin-bottom: 24px; line-height: 1.6;">Dữ liệu bao gồm cả thùng rác sẽ bị <b>xóa vĩnh viễn</b>.</p>
            <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; color:#111;">Khu vực:</label>
            <select id="clear-target" style="width:100%; margin-bottom:20px; padding: 14px; border-radius: 10px; border: 1px solid #e5e5e5; font-family: 'Inter'; background:#fafafa;">
                <option value="phucyen">Phúc Yên</option>
                <option value="vinhyen">Vĩnh Yên</option>
                <option value="all" style="color: #111; font-weight: bold;">Tất cả cơ sở</option>
            </select>
            <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; color:#111;">Mã bảo mật:</label>
            <input type="password" id="clear-pass" placeholder="Nhập mã xác nhận..." style="width:100%; margin-bottom:32px;">
            <div style="display:flex; gap:12px;">
                <button onclick="document.getElementById('clear-modal').style.display='none'" class="btn-outline" style="flex:1; padding: 14px; background: #f4f4f5; border: none;">Hủy</button>
                <button onclick="executeClearData()" class="btn-add" style="flex:1; padding: 14px;">Xác nhận xóa</button>
            </div>
        </div>
    </div>

    <div id="revenue-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px; padding: 24px;">
            <h3 style="margin-top:0; color:#111; font-size: 18px; margin-bottom: 20px; display:flex; align-items:center; justify-content:space-between;">
                <span style="display:flex; align-items:center; gap:8px;">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> 
                    BÁO CÁO DOANH THU
                </span>
                <button onclick="document.getElementById('revenue-modal').style.display='none'" style="background:none; border:none; cursor:pointer; font-size:24px; color:#888; padding:0;">&times;</button>
            </h3>
            
            <div style="background:#fafafa; border:1px solid #e5e5e5; border-radius:12px; padding:16px; margin-bottom:16px;">
                <div style="font-size:13px; font-weight:700; color:#111; margin-bottom:12px; text-transform:uppercase;">Doanh thu Hôm nay</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div style="background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:12px;">
                        <div style="font-size:11px; color:#666; margin-bottom:4px;">Tiền mặt</div>
                        <div id="rev-today-cash" style="font-size:16px; font-weight:700; color:#f59e0b;">0 ₫</div>
                    </div>
                    <div style="background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:12px;">
                        <div style="font-size:11px; color:#666; margin-bottom:4px;">Chuyển khoản</div>
                        <div id="rev-today-trans" style="font-size:16px; font-weight:700; color:#10b981;">0 ₫</div>
                    </div>
                    <div style="grid-column: span 2; background:#111; border-radius:8px; padding:12px; color:#fff;">
                        <div style="font-size:11px; color:#ccc; margin-bottom:4px;">Tổng cộng</div>
                        <div id="rev-today-total" style="font-size:20px; font-weight:700;">0 ₫</div>
                    </div>
                </div>
            </div>

            <div style="background:#fafafa; border:1px solid #e5e5e5; border-radius:12px; padding:16px;">
                <div style="font-size:13px; font-weight:700; color:#111; margin-bottom:12px; text-transform:uppercase;">Doanh thu Tháng này</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div style="background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:12px;">
                        <div style="font-size:11px; color:#666; margin-bottom:4px;">Tiền mặt</div>
                        <div id="rev-month-cash" style="font-size:16px; font-weight:700; color:#f59e0b;">0 ₫</div>
                    </div>
                    <div style="background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:12px;">
                        <div style="font-size:11px; color:#666; margin-bottom:4px;">Chuyển khoản</div>
                        <div id="rev-month-trans" style="font-size:16px; font-weight:700; color:#10b981;">0 ₫</div>
                    </div>
                    <div style="grid-column: span 2; background:#111; border-radius:8px; padding:12px; color:#fff;">
                        <div style="font-size:11px; color:#ccc; margin-bottom:4px;">Tổng cộng</div>
                        <div id="rev-month-total" style="font-size:20px; font-weight:700;">0 ₫</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = 'd47a0ff216df7f718f898c65afa1cc17'; 
        const db = firebase.database();
        const PASS_STAFF = "123456"; const PASS_ADMIN = "Anle123456";
        let userRole = ''; let dbPath = 'data/'; let br = 'phucyen';
        let currentData = {}; let previousCount = 0; let isFirstLoad = true;

        const Toast = Swal.mixin({
            toast: true, position: 'top-end', showConfirmButton: false, timer: 2500,
            timerProgressBar: true, background: '#111', color: '#fff', iconColor: '#fff',
            didOpen: (toast) => { toast.addEventListener('mouseenter', Swal.stopTimer); toast.addEventListener('mouseleave', Swal.resumeTimer); }
        });

        window.onload = () => {
            const savedRole = localStorage.getItem('pn_admin_role');
            if (savedRole === 'admin' || savedRole === 'staff') { userRole = savedRole; setupUI(); }
        };

        function getTodayForInput() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        function clearDateFilter() { document.getElementById('date-filter').value = ""; filterData(); }

        function login() {
            const p = document.getElementById('pass').value;
            if(p === PASS_ADMIN || p === PASS_STAFF) {
                userRole = (p === PASS_ADMIN) ? 'admin' : 'staff';
                localStorage.setItem('pn_admin_role', userRole);
                setupUI();
                Toast.fire({ icon: 'success', title: 'Đăng nhập thành công' });
            } else {
                Swal.fire({ icon: 'error', title: 'Sai mã bảo mật!', text: 'Vui lòng kiểm tra lại.', confirmButtonColor: '#111' });
            }
        }

        function logout() {
            Swal.fire({
                title: 'Đăng xuất?', text: "Bạn sẽ cần nhập lại mật khẩu để vào hệ thống.", icon: 'question',
                showCancelButton: true, confirmButtonColor: '#111', cancelButtonColor: '#fff', cancelButtonText: '<span style="color:#111">Hủy</span>', confirmButtonText: 'Đăng xuất'
            }).then((result) => {
                if (result.isConfirmed) { localStorage.removeItem('pn_admin_role'); location.reload(); }
            });
        }

        function setupUI() {
            document.body.classList.add('role-' + userRole);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
            document.getElementById('date-filter').value = getTodayForInput();
            load();
        }

        function switchB(name) { br = name; isFirstLoad = true; previousCount = 0; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+name).classList.add('active'); load(); }

        function toggleTrash() {
            if (dbPath === 'data/') { 
                dbPath = 'trash/'; 
                document.getElementById('btn-trash').innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Quay lại`; 
                document.getElementById('btn-trash').style.color = '#18181b'; 
            } else { 
                dbPath = 'data/'; 
                document.getElementById('btn-trash').innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> Thùng rác`; 
                document.getElementById('btn-trash').style.color = '#52525b'; 
            }
            isFirstLoad = true; previousCount = 0; load();
        }

        function openRevenueModal() {
            if(userRole !== 'admin') return Toast.fire({icon: 'error', title: 'Chỉ Quản trị viên được xem'});
            
            let todayTotal = 0, todayCash = 0, todayTransfer = 0;
            let monthTotal = 0, monthCash = 0, monthTransfer = 0;

            const todayStr = new Date().toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
            const currentMonthStr = new Date().toLocaleDateString('vi-VN', {month:'2-digit', year:'numeric'});

            if(currentData) {
                Object.keys(currentData).forEach(id => {
                    const c = currentData[id];
                    if (!c.price || c.price === 'Miễn phí') return;

                    const priceVal = parseInt(c.price.replace(/\\D/g, ''), 10) || 0;
                    const ts = parseInt(id.split('_')[1]) || Date.now();
                    const dObj = new Date(ts);
                    const dStr = dObj.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
                    const mStr = dObj.toLocaleDateString('vi-VN', {month:'2-digit', year:'numeric'});
                    
                    if (mStr === currentMonthStr) {
                        monthTotal += priceVal;
                        if (c.payment === 'Tiền mặt') monthCash += priceVal;
                        if (c.payment === 'Chuyển khoản') monthTransfer += priceVal;
                    }
                    if (dStr === todayStr) {
                        todayTotal += priceVal;
                        if (c.payment === 'Tiền mặt') todayCash += priceVal;
                        if (c.payment === 'Chuyển khoản') todayTransfer += priceVal;
                    }
                });
            }

            document.getElementById('rev-today-total').innerText = todayTotal.toLocaleString('vi-VN') + ' ₫';
            document.getElementById('rev-today-cash').innerText = todayCash.toLocaleString('vi-VN') + ' ₫';
            document.getElementById('rev-today-trans').innerText = todayTransfer.toLocaleString('vi-VN') + ' ₫';

            document.getElementById('rev-month-total').innerText = monthTotal.toLocaleString('vi-VN') + ' ₫';
            document.getElementById('rev-month-cash').innerText = monthCash.toLocaleString('vi-VN') + ' ₫';
            document.getElementById('rev-month-trans').innerText = monthTransfer.toLocaleString('vi-VN') + ' ₫';

            document.getElementById('revenue-modal').style.display = 'flex';
        }

        function load() {
            db.ref('data/' + br).off(); db.ref('trash/' + br).off();
            db.ref(dbPath + br).on('value', snap => {
                const list = document.getElementById('list-content');
                const trashHeader = document.getElementById('trash-header');
                list.innerHTML = ""; document.getElementById('empty-msg').style.display = 'none';
                currentData = snap.val();
                
                if(!currentData) { 
                    document.querySelector('.empty-text').innerText = (dbPath === 'trash/') ? "Thùng rác đang trống." : "Hôm nay chưa có dữ liệu nào.";
                    document.getElementById('empty-msg').style.display = 'block';
                    trashHeader.style.display = 'none'; previousCount = 0; return; 
                }

                if (dbPath === 'trash/') {
                    trashHeader.style.display = 'flex';
                    trashHeader.innerHTML = `
                        <div class="trash-notice" style="width:100%;">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                                <div><b style="font-size:14px; font-family:'Inter';">THÙNG RÁC</b></div>
                            </div>
                            <button onclick="emptyTrash()" class="btn-outline" style="border:none; color:#111; background:#fff; padding: 8px 16px;">DỌN SẠCH</button>
                        </div>`;
                } else trashHeader.style.display = 'none';

                const currentCount = Object.keys(currentData).length;
                if(!isFirstLoad && currentCount > previousCount && dbPath === 'data/') { Toast.fire({ icon: 'info', title: 'Có khách hàng mới!' });}
                previousCount = currentCount; isFirstLoad = false;
                
                const groupedData = {};
                Object.keys(currentData).forEach(clientId => {
                    const client = currentData[clientId];
                    const timestamp = parseInt(clientId.split('_')[1]) || Date.now();
                    const dateStr = new Date(timestamp).toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
                    if(!groupedData[dateStr]) groupedData[dateStr] = { timestamp: timestamp, clients: [] };
                    groupedData[dateStr].clients.push({ id: clientId, ...client, ts: timestamp });
                });

                const sortedDates = Object.keys(groupedData).sort((a, b) => groupedData[b].timestamp - groupedData[a].timestamp);
                const todayStr = new Date().toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});

                sortedDates.forEach(date => {
                    const groupDiv = document.createElement('div'); groupDiv.className = 'date-group';
                    const dateLabel = (date === todayStr) ? "Hôm nay, " + date : date;
                    let html = `<div class="date-header"><span style="display:flex; align-items:center;"><svg class="icon-sm" style="margin-right:6px;" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${dateLabel}</span><span style="font-size:12px; color:#71717a;">${groupedData[date].clients.length} khách</span></div>`;
                    
                    groupedData[date].clients.sort((a, b) => b.ts - a.ts).forEach(client => {
                        const isDone = client.status === 'completed'; const maKh = client.id.split('_')[1].slice(-4); const safeName = client.name ? client.name.replace(/'/g, "\\'") : "Khách hàng"; 

                        let linksHtml = '';
                        if (client.links) {
                            Object.keys(client.links).forEach(linkId => {
                                linksHtml += `<div class="link-row">
                                    <span style="font-size:12px; color:#888; font-family:monospace; font-weight:600; margin-right:8px;">${client.links[linkId].addedAt}</span>
                                    <input type="text" value="${client.links[linkId].url}" readonly>
                                    <button onclick="deleteLink('${client.id}', '${linkId}')" class="btn-outline" style="padding:8px 12px; border-color:#e5e5e5; color:#ef4444; background:#fff;">XÓA</button>
                                </div>`;
                            });
                        }

                        let clientUploadsHtml = '';
                        if (client.client_uploads && dbPath === 'data/') {
                            Object.keys(client.client_uploads).forEach(uId => {
                                const up = client.client_uploads[uId];
                                let imgLinks = "";
                                up.links.forEach((l, i) => {
                                    imgLinks += `<a href="${l}" target="_blank" style="color:#111; font-size:12px; font-weight:600; text-decoration:underline; margin-right:12px; display:inline-block; margin-top:5px;">Ảnh gốc ${i+1}</a>`;
                                });
                                clientUploadsHtml += `
                                    <div style="background:#fafafa; border:1px dashed #d4d4d8; padding:12px 15px; border-radius:10px; margin-bottom:12px;">
                                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:10px;">
                                            <span style="font-size:12px; font-weight:700; color:#111; display:flex; align-items:center; gap:6px; text-transform:uppercase;">
                                                <svg class="icon-sm" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                                                Yêu cầu in (${up.time.split(' ')[1] || ''})
                                            </span>
                                            <button onclick="delClientUp('${client.id}', '${uId}')" style="background:none; border:none; color:#ef4444; font-size:11px; cursor:pointer; font-weight:600; text-decoration:underline; padding:0;">Hoàn tất (Xóa)</button>
                                        </div>
                                        <div style="display:flex; flex-wrap:wrap;">${imgLinks}</div>
                                    </div>`;
                            });
                        }

                        let actionButtons = (dbPath === 'trash/') ? 
                            `<button class="btn-restore admin-only" onclick="restoreCustomer('${client.id}', '${safeName}')">Khôi phục</button><button class="btn-del-client admin-only" onclick="hardDeleteCustomer('${client.id}', '${safeName}')">Xóa Vĩnh Viễn</button>` : 
                            `<button class="btn-del-client admin-only" onclick="softDeleteCustomer('${client.id}', '${safeName}')">Xóa Khách Này</button>`;

                        let checkboxHtml = (dbPath === 'trash/') ? `<div style="display:flex; align-items:flex-start; margin-right:15px; padding-top:2px;"><input type="checkbox" class="trash-cb" value="${client.id}" style="width:20px; height:20px; cursor:pointer;"></div>` : '';

                        html += `
                            <div class="client-card" data-search="${(client.name + " " + client.phone + " " + maKh).toLowerCase()}">
                                ${checkboxHtml}
                                <div class="client-info">
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px;">
                                        <h3 style="margin:0; font-size: 16px; display:flex; align-items:center; gap:8px;">
                                            ${client.name} 
                                            <span style="font-size:12px; color:#888; font-family:monospace; font-weight:normal; border: 1px solid #e5e5e5; padding: 2px 6px; border-radius: 4px; background: #fafafa;">#${maKh}</span>
                                        </h3>
                                        <span class="badge ${isDone?'done':'pending'}">${isDone?'HOÀN TẤT':'CHỜ ẢNH'}</span>
                                    </div>
                                    <p style="margin:0 0 12px 0; font-size:13px; color:#666; display:flex; gap:16px; flex-wrap: wrap; align-items:center;">
                                        <span style="display:flex; align-items:center; gap:4px;"><svg class="icon-sm" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg> ${client.phone}</span>
                                        <span style="display:flex; align-items:center; gap:4px;"><svg class="icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${client.time}</span>
                                        <span style="display:flex; align-items:center; gap:6px;" class="admin-only">
                                            <svg class="icon-sm" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                            <input type="text" list="price-list" class="price-input" placeholder="Nhập giá..." value="${client.price || ''}" onchange="formatAndSavePrice(this, '${client.id}')" title="Gõ số tiền tự format">
                                            <select class="price-input" style="width:auto; cursor:pointer;" onchange="updatePaymentMethod('${client.id}', this.value)">
                                                <option value="">Nguồn tiền...</option>
                                                <option value="Tiền mặt" ${client.payment === 'Tiền mặt' ? 'selected' : ''}>Tiền mặt</option>
                                                <option value="Chuyển khoản" ${client.payment === 'Chuyển khoản' ? 'selected' : ''}>Chuyển khoản</option>
                                            </select>
                                        </span>
                                    </p>
                                    <div class="admin-only" style="margin-bottom: 15px;">${actionButtons}</div>
                                </div>
                                <div class="link-manager">
                                    ${clientUploadsHtml}
                                    
                                    <div style="font-size: 11px; font-weight: 600; color: #a1a1aa; margin-bottom: 8px; text-transform: uppercase;">Tiệm trả ảnh:</div>
                                    ${linksHtml}
                                    <div class="add-box">
                                        <div style="display:flex; gap:10px; align-items:center; width:100%; flex-wrap: wrap;">
                                            <div style="display: flex; align-items: center; gap: 10px; flex-grow: 1; border: 1px dashed #d4d4d8; border-radius: 10px; padding: 8px 12px; background: #fafafa; box-sizing: border-box;">
                                                <label for="file_${client.id}" style="cursor: pointer; background: #fff; border: 1px solid #d4d4d8; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #111; white-space: nowrap; transition: 0.2s;">Chọn ảnh</label>
                                                <input type="file" id="file_${client.id}" multiple accept="image/*" style="display:none;" onchange="document.getElementById('fname_${client.id}').innerText = this.files.length > 0 ? this.files.length + ' tệp đã chọn' : 'Chưa có tệp'">
                                                <span id="fname_${client.id}" style="font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; font-family: 'Inter';">Chưa có tệp</span>
                                            </div>
                                            <button class="btn btn-add" id="btn_up_${client.id}" onclick="uploadPhotosToImgBB('${client.id}')" style="margin-top:0; white-space:nowrap; display:flex; align-items:center; justify-content:center; padding: 12px 18px;">
                                                <svg class="icon-svg" style="margin-right:4px; margin-bottom:0;" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> TẢI LÊN
                                            </button>
                                        </div>
                                        <div style="display: flex; gap: 10px; align-items: flex-start; margin-top: 5px;">
                                            <textarea id="new_${client.id}" placeholder="Hoặc dán thủ công link ảnh (mỗi dòng 1 link)..."></textarea>
                                            <button class="btn btn-add" onclick="addLink('${client.id}')" style="background: #fff; color: #111; border: 1px solid #d4d4d8; padding: 12px 18px;">LƯU</button>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    });
                    groupDiv.innerHTML += html; list.appendChild(groupDiv);
                });
                filterData(); 
            });
        }

        // Tự động định dạng giá tiền
        function formatAndSavePrice(input, id) {
            let val = input.value.trim();
            if (val.toLowerCase() === 'miễn phí' || val.toLowerCase() === 'mien phi') {
                val = 'Miễn phí';
            } else {
                let numStr = val.replace(/\\D/g, '');
                if (numStr) {
                    val = parseInt(numStr, 10).toLocaleString('vi-VN') + ' đ';
                } else {
                    val = '';
                }
            }
            input.value = val;
            db.ref(dbPath + br + '/' + id).update({ price: val });
            Toast.fire({ icon: 'success', title: 'Đã lưu giá tiền' });
        }

        function updatePaymentMethod(id, val) {
            db.ref(dbPath + br + '/' + id).update({ payment: val });
            Toast.fire({ icon: 'success', title: 'Đã lưu nguồn tiền' });
        }

        function toggleSelectAllTrash(source) { document.querySelectorAll('.trash-cb').forEach(cb => { if(cb.closest('.client-card').style.display !== 'none') cb.checked = source.checked; }); }

        function deleteSelectedTrash() {
            if(userRole !== 'admin') return;
            const checkboxes = document.querySelectorAll('.trash-cb:checked');
            if(checkboxes.length === 0) { Toast.fire({ icon: 'warning', title: 'Chưa chọn khách nào!' }); return; }
            
            Swal.fire({
                title: 'Xác nhận xóa hàng loạt', text: `Sẽ xóa VĨNH VIỄN ${checkboxes.length} mục đã chọn.`, icon: 'warning',
                input: 'password', inputPlaceholder: 'Nhập mật khẩu Admin', showCancelButton: true, confirmButtonColor: '#111', confirmButtonText: 'Xóa Vĩnh Viễn'
            }).then((result) => {
                if (result.isConfirmed) {
                    if(result.value === PASS_ADMIN) {
                        const promises = [];
                        checkboxes.forEach(cb => promises.push(db.ref('trash/' + br + '/' + cb.value).remove()));
                        Promise.all(promises).then(() => Toast.fire({ icon: 'success', title: `Đã xóa ${checkboxes.length} mục!` })).catch(err => Swal.fire('Lỗi', err.message, 'error'));
                    } else { Swal.fire({title: 'Thất bại', text: 'Sai mã bảo mật!', icon: 'error', confirmButtonColor: '#111'}); }
                }
            });
        }

        function filterData() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const dateInput = document.getElementById('date-filter').value;
            let targetDate = ""; let visibleGroupCount = 0;
            
            if (dateInput) { const parts = dateInput.split('-'); targetDate = `${parts[2]}/${parts[1]}/${parts[0]}`; }

            document.querySelectorAll('.date-group').forEach(group => {
                let hasVisibleCard = false;
                const headerDate = group.querySelector('.date-header span:first-child').innerText;
                if (targetDate && !headerDate.includes(targetDate)) { group.style.display = 'none'; return; }
                group.querySelectorAll('.client-card').forEach(card => {
                    const text = card.getAttribute('data-search');
                    if(text.includes(query)) { card.style.display = 'flex'; hasVisibleCard = true; } else card.style.display = 'none';
                });
                if (hasVisibleCard) { group.style.display = 'block'; visibleGroupCount++; } else group.style.display = 'none';
            });
            
            document.querySelector('.empty-text').innerText = "Không tìm thấy dữ liệu khớp với tìm kiếm/ngày chọn.";
            document.getElementById('empty-msg').style.display = (visibleGroupCount === 0 && document.getElementById('list-content').innerHTML !== "") ? 'block' : 'none';
        }

        function exportExcel() {
            if(userRole !== 'admin') return Toast.fire({ icon: 'error', title: 'Không có quyền' });
            if(!currentData) return Toast.fire({ icon: 'warning', title: 'Không có dữ liệu!' });
            let csvContent = "data:text/csv;charset=utf-8,\uFEFFNgày,Giờ,Mã KH,Họ Tên,SĐT,Giá Tiền,Nguồn Tiền,Cơ Sở\\n";
            Object.keys(currentData).forEach(id => {
                const c = currentData[id]; const ts = parseInt(id.split('_')[1]) || Date.now();
                const d = new Date(ts).toLocaleDateString('vi-VN'); const mk = id.split('_')[1].slice(-4);
                const price = c.price || '0';
                const payment = c.payment || '';
                csvContent += `"${d}","${c.time}","#${mk}","${c.name}","${c.phone}","${price}","${payment}","${br === 'phucyen' ? 'Phúc Yên' : 'Vĩnh Yên'}"\\n`;
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `PHOTONOIR_Report_${new Date().toLocaleDateString('vi-VN')}.csv`);
            document.body.appendChild(link); link.click(); Toast.fire({ icon: 'success', title: 'Đã xuất Excel' });
        }

        async function uploadPhotosToImgBB(clientId) {
            const fileInput = document.getElementById('file_' + clientId);
            const files = fileInput.files;
            const btn = document.getElementById('btn_up_' + clientId);

            if (files.length === 0) return Swal.fire({title: 'Lỗi', text: 'Chưa chọn ảnh nào!', icon: 'warning', confirmButtonColor: '#111'});

            btn.innerHTML = `<svg class="icon-svg" style="margin-right:4px; animation: spin 1s infinite linear;" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> ĐANG TẢI...`;
            btn.disabled = true;

            try {
                const now = new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) + ' ' + new Date().toLocaleDateString('vi-VN');
                for (let i = 0; i < files.length; i++) {
                    const formData = new FormData();
                    formData.append("image", files[i]);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const data = await response.json();

                    if (data.success) {
                        const url = data.data.url;
                        const linkId = "L_" + Date.now() + "_" + i;
                        await db.ref(dbPath + br + '/' + clientId + '/links/' + linkId).set({ url: url, addedAt: now });
                    }
                }
                await db.ref(dbPath + br + '/' + clientId).update({ status: "completed" });
                Toast.fire({ icon: 'success', title: 'Tải lên hoàn tất!' });
                fileInput.value = ""; 
                document.getElementById('fname_'+clientId).innerText = 'Chưa có tệp';
            } catch (error) {
                Swal.fire({title: 'Lỗi', text: 'Không thể kết nối tải ảnh.', icon: 'error', confirmButtonColor: '#111'});
            } finally {
                btn.innerHTML = `<svg class="icon-svg" style="margin-right:4px;" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> TẢI LÊN`;
                btn.disabled = false;
            }
        }

        function addLink(clientId) {
            const text = document.getElementById('new_' + clientId).value.trim();
            if(!text) return Toast.fire({ icon: 'warning', title: 'Chưa dán link!' });
            const urls = text.split(/\\r?\\n/).map(u => u.trim()).filter(u => u !== ""); 
            if(urls.length === 0) return;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) + ' ' + now.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'});
            
            urls.forEach((url, index) => {
                const linkId = "L_" + Date.now() + "_" + index; 
                db.ref(dbPath + br + '/' + clientId + '/links/' + linkId).set({ url: url, addedAt: timeStr });
            });
            db.ref(dbPath + br + '/' + clientId).update({ status: "completed" });
            document.getElementById('new_' + clientId).value = ""; 
            Toast.fire({ icon: 'success', title: 'Đã lưu link' });
        }

        function deleteLink(clientId, linkId) { 
            if(userRole !== 'admin') return; 
            Swal.fire({ title: 'Xóa ảnh này?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#111', cancelButtonColor: '#fff', confirmButtonText: 'Xóa', cancelButtonText: '<span style="color:#111">Hủy</span>' }).then(r => { if(r.isConfirmed) { db.ref(dbPath + br + '/' + clientId + '/links/' + linkId).remove(); Toast.fire({ icon: 'success', title: 'Đã xóa' }); }}); 
        }

        function delClientUp(cId, uId) {
            if(userRole !== 'admin') return;
            Swal.fire({ title: 'Xóa yêu cầu in?', showCancelButton: true, confirmButtonText: 'Xóa', cancelButtonText: '<span style="color:#111">Hủy</span>', confirmButtonColor: '#111' }).then(r => {
                if(r.isConfirmed) {
                    db.ref(dbPath + br + '/' + cId + '/client_uploads/' + uId).remove();
                    Toast.fire({ icon: 'success', title: 'Đã xóa yêu cầu in' });
                }
            });
        }

        function softDeleteCustomer(clientId, clientName) { 
            if(userRole !== 'admin') return; 
            Swal.fire({ title: 'Chuyển vào Thùng Rác?', text: `Khách hàng '${clientName}'`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#111', cancelButtonColor: '#fff', confirmButtonText: 'Chuyển', cancelButtonText: '<span style="color:#111">Hủy</span>' }).then(r => {
                if (r.isConfirmed) {
                    db.ref('data/' + br + '/' + clientId).once('value').then(snap => db.ref('trash/' + br + '/' + clientId).set(snap.val()).then(() => db.ref('data/' + br + '/' + clientId).remove())).then(() => Toast.fire({ icon: 'success', title: 'Đã chuyển thùng rác' })).catch(err => Swal.fire('Lỗi', err.message, 'error'));
                }
            }); 
        }

        function restoreCustomer(clientId, clientName) { 
            if(userRole !== 'admin') return; 
            db.ref('trash/' + br + '/' + clientId).once('value').then(snap => db.ref('data/' + br + '/' + clientId).set(snap.val()).then(() => db.ref('trash/' + br + '/' + clientId).remove())).then(() => Toast.fire({ icon: 'success', title: `Đã khôi phục '${clientName}'` })).catch(err => Swal.fire('Lỗi', err.message, 'error')); 
        }

        function hardDeleteCustomer(clientId, clientName) { 
            if(userRole !== 'admin') return; 
            Swal.fire({ title: 'Xóa Vĩnh Viễn?', text: `Khách '${clientName}'`, icon: 'warning', input: 'password', inputPlaceholder: 'Nhập Pass Admin', showCancelButton: true, confirmButtonColor: '#111', cancelButtonColor: '#fff', confirmButtonText: 'Xóa', cancelButtonText: '<span style="color:#111">Hủy</span>' }).then(r => {
                if (r.isConfirmed) {
                    if(r.value === PASS_ADMIN) { db.ref('trash/' + br + '/' + clientId).remove().then(() => Toast.fire({ icon: 'success', title: 'Đã xóa vĩnh viễn' })); } 
                    else { Swal.fire({title: 'Thất bại', text: 'Sai mã bảo mật!', icon: 'error', confirmButtonColor: '#111'}); }
                }
            }); 
        }
        
        function openClearModal() {
            if(userRole !== 'admin') return Swal.fire({title: 'Từ chối', text: 'Chỉ Admin mới thao tác được!', icon: 'error', confirmButtonColor: '#111'});
            document.getElementById('clear-pass').value = '';
            document.getElementById('clear-modal').style.display = 'flex';
        }

        function executeClearData() {
            const target = document.getElementById('clear-target').value;
            const pass = document.getElementById('clear-pass').value;
            if (pass !== PASS_ADMIN) return Swal.fire({title: 'Thất bại', text: 'Mật khẩu Admin không chính xác!', icon: 'error', confirmButtonColor: '#111'});

            let confirmMsg = target === 'all' ? "TẤT CẢ CƠ SỞ" : (target === 'phucyen' ? "PHÚC YÊN" : "VĨNH YÊN");
            
            Swal.fire({ title: 'DỌN SẠCH HỆ THỐNG', text: `Hành động này sẽ XÓA SẠCH VÀ VĨNH VIỄN toàn bộ dữ liệu của ${confirmMsg}.\\nBạn chắc chắn chứ?`, icon: 'error', showCancelButton: true, confirmButtonColor: '#111', cancelButtonColor: '#fff', confirmButtonText: 'TÔI CHẮC CHẮN XÓA', cancelButtonText: '<span style=\"color:#111\">Hủy</span>' }).then(r => {
                if (r.isConfirmed) {
                    if (target === 'all') { db.ref('data/phucyen').remove(); db.ref('data/vinhyen').remove(); db.ref('trash/phucyen').remove(); db.ref('trash/vinhyen').remove(); } 
                    else { db.ref('data/' + target).remove(); db.ref('trash/' + target).remove(); }
                    document.getElementById('clear-modal').style.display = 'none';
                    Swal.fire({title: 'Hoàn tất!', text: `Đã dọn sạch hệ thống cho ${confirmMsg}!`, icon: 'success', confirmButtonColor: '#111'});
                }
            });
        }
    </script>
</body>
</html>
