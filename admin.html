<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - PHOTO NOIR SELFBOOTH ALBUM</title>
    <link rel="icon" href="./logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f5; margin: 0; padding: 10px; color: #111; }
        #login-screen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .admin-box { max-width: 1000px; margin: auto; display: none; padding-bottom: 50px; }
        
        /* Responsive Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; border: 1px solid #d4d4d8; border-radius: 8px; cursor: pointer; background: #fff; color: #111; font-weight: 500; transition: 0.2s; white-space: nowrap; flex-shrink: 0; }
        .tab-btn.active { background: #18181b; color: #fff; border-color: #18181b; }
        
        /* Toolbar */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #d4d4d8; outline: none; font-size: 14px; background: #fff; }
        .btn-excel { padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 13px; width: 100%; md:width: auto; }

        .date-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #18181b; margin: 30px 0 15px 0; font-weight: 700; font-size: 16px; }
        
        /* Client Card Responsive */
        .client-card { background: #fff; border-radius: 12px; border: 1px solid #e4e4e7; padding: 15px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 15px; transition: 0.2s; }
        @media (min-width: 768px) {
            .client-card { flex-direction: row; padding: 20px; gap: 20px; align-items: flex-start; }
            body { padding: 20px; }
            .btn-excel { width: auto; }
        }

        .client-info { width: 100%; position: relative; border-bottom: 1px solid #f4f4f5; padding-bottom: 15px; }
        @media (min-width: 768px) {
            .client-info { width: 220px; flex-shrink: 0; border-right: 1px solid #f4f4f5; border-bottom: none; padding-bottom: 0; padding-right: 15px; }
        }

        .client-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #111; }
        .client-info p { margin: 0 0 5px 0; color: #71717a; font-size: 13px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .badge.pending { background: #fef3c7; color: #b45309; }
        .badge.done { background: #dcfce7; color: #166534; }
        .makh-display { font-size: 11px; color: #71717a; position: absolute; top: 0; right: 0; font-family: monospace; font-weight: 600;}

        .link-manager { flex-grow: 1; width: 100%; }
        .link-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: #fafafa; padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #f4f4f5; }
        .link-row input { flex-grow: 1; min-width: 150px; padding: 8px; border: 1px solid #d4d4d8; border-radius: 6px; font-size: 13px; }
        .link-row .time-label { font-size: 11px; color: #a1a1aa; width: 100%; }
        @media (min-width: 480px) { .link-row .time-label { width: 100px; } }

        button.btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        .btn-add { background: #18181b; color: #fff; width: 80px; }
        .btn-save { background: #e4e4e7; color: #18181b; }
        .btn-del { background: #fee2e2; color: #ef4444; }
        .btn-del-client { background: #fff; border: 1px solid #fee2e2; color: #ef4444; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px; text-transform: uppercase; width: 100%; margin-top: 15px; }

        .add-box { display: flex; gap: 8px; margin-top: 10px; border-top: 1px dashed #e4e4e7; padding-top: 15px; }
        .add-box input { flex-grow: 1; padding: 10px; border: 1px solid #d4d4d8; border-radius: 8px; font-size: 13px; outline: none; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div style="text-align:center; width: 100%; max-width: 320px;">
            <img src="./logo.png" style="width: 80px; border-radius: 50%; margin-bottom: 15px; border: 1px solid #eee;" onerror="this.style.display='none'">
            <h3 style="margin-bottom: 25px; letter-spacing: 1px;">PHOTO NOIR ADMIN LOGIN</h3>
            <input type="password" id="pass" placeholder="Mật khẩu hệ thống..." style="width:100%; padding:14px; border-radius:12px; border:1px solid #d4d4d8; margin-bottom:15px; box-sizing: border-box; font-size: 16px;">
            <button onclick="login()" style="width:100%; padding:14px; background:#18181b; color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:700; text-transform: uppercase;">Đăng nhập</button>
        </div>
    </div>

    <div class="admin-box" id="admin-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="margin: 0; font-size: 20px;">QUẢN LÝ TRẢ ẢNH</h2>
            <button onclick="clearData()" style="color:#ef4444; background:none; border:none; cursor:pointer; font-weight:600; font-size: 12px;">DỌN DỮ LIỆU</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" id="btn-phucyen" onclick="switchB('phucyen')">Chi nhánh Phúc Yên</button>
            <button class="tab-btn" id="btn-vinhyen" onclick="switchB('vinhyen')">Chi nhánh Vĩnh Yên</button>
        </div>

        <div class="toolbar">
            <input type="text" id="search-box" class="search-box" placeholder="🔍 Tìm tên, SĐT hoặc mã KH..." onkeyup="searchCustomer()">
            <button class="btn-excel" onclick="exportExcel()">Xuất báo cáo</button>
        </div>

        <div id="list-content">Đang tải danh sách...</div>
    </div>

    <audio id="ting-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcih83r2AhH85J3Pp31i7qq8OkuRAIyxw",
            databaseURL: "https://tra-anh-khach-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tra-anh-khach",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const MASTER_PASS = "123456"; // Mật khẩu dùng chung cho login và xóa
        let br = 'phucyen';
        let currentData = {};
        let previousCount = 0;
        let isFirstLoad = true;

        function login() {
            if(document.getElementById('pass').value === MASTER_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-box').style.display = 'block';
                document.getElementById('ting-sound').volume = 0;
                document.getElementById('ting-sound').play().catch(()=>{});
                load();
            } else alert("Mật khẩu không chính xác!");
        }

        function switchB(name) {
            br = name;
            isFirstLoad = true; 
            previousCount = 0;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+name).classList.add('active');
            load();
        }

        function getTodayString() {
            return new Date().toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
        }

        function load() {
            db.ref('data/' + br).on('value', snap => {
                const list = document.getElementById('list-content');
                list.innerHTML = "";
                currentData = snap.val();
                
                if(!currentData) { 
                    list.innerHTML = "<p style='text-align:center; color:#a1a1aa; padding: 50px 0;'>Hôm nay chưa có dữ liệu khách hàng.</p>"; 
                    previousCount = 0;
                    return; 
                }

                const currentCount = Object.keys(currentData).length;
                if(!isFirstLoad && currentCount > previousCount) {
                    const audio = document.getElementById('ting-sound');
                    audio.volume = 1;
                    audio.play();
                }
                previousCount = currentCount;
                isFirstLoad = false;
                
                const groupedData = {};
                const todayStr = getTodayString();

                Object.keys(currentData).forEach(clientId => {
                    const client = currentData[clientId];
                    const timestamp = parseInt(clientId.split('_')[1]) || Date.now();
                    const dateObj = new Date(timestamp);
                    const dateStr = dateObj.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
                    
                    if(!groupedData[dateStr]) groupedData[dateStr] = { timestamp: timestamp, clients: [] };
                    groupedData[dateStr].clients.push({ id: clientId, ...client, ts: timestamp });
                });

                const sortedDates = Object.keys(groupedData).sort((a, b) => groupedData[b].timestamp - groupedData[a].timestamp);

                sortedDates.forEach(date => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'date-group';
                    const dateLabel = (date === todayStr) ? "Hôm nay, " + date : date;
                    
                    let html = `<div class="date-header"><span>📅 ${dateLabel}</span><span style="font-size:12px; color:#71717a;">${groupedData[date].clients.length} khách</span></div>`;
                    const sortedClients = groupedData[date].clients.sort((a, b) => b.ts - a.ts);

                    sortedClients.forEach(client => {
                        const isDone = client.status === 'completed';
                        const maKh = client.id.split('_')[1].slice(-4); 
                        const safeName = client.name ? client.name.replace(/'/g, "\\'") : "Khách hàng"; 

                        let linksHtml = '';
                        if (client.links) {
                            Object.keys(client.links).forEach(linkId => {
                                const l = client.links[linkId];
                                linksHtml += `<div class="link-row"><span class="time-label">${l.addedAt}</span><input type="text" id="edit_${client.id}_${linkId}" value="${l.url}"><div style="display:flex; gap:5px;"><button class="btn btn-save" onclick="updateLink('${client.id}', '${linkId}')">Sửa</button><button class="btn btn-del" onclick="deleteLink('${client.id}', '${linkId}')">Xóa</button></div></div>`;
                            });
                        }

                        html += `
                            <div class="client-card" data-search="${(client.name + " " + client.phone + " " + maKh).toLowerCase()}">
                                <div class="client-info">
                                    <span class="makh-display">#${maKh}</span>
                                    <h3>${client.name}</h3>
                                    <p>SĐT: ${client.phone}</p>
                                    <p>Giờ: ${client.time}</p>
                                    <span class="badge ${isDone ? 'done' : 'pending'}">${isDone ? 'Đã trả ảnh' : 'Đang chờ'}</span>
                                    <button class="btn-del-client" onclick="deleteCustomer('${client.id}', '${safeName}')">Xóa Khách Này</button>
                                </div>
                                <div class="link-manager">
                                    ${linksHtml}
                                    <div class="add-box">
                                        <input type="text" id="new_${client.id}" placeholder="Dán link ảnh tại đây...">
                                        <button class="btn btn-add" onclick="addLink('${client.id}')">Lưu</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    groupDiv.innerHTML = html;
                    list.appendChild(groupDiv);
                });
                searchCustomer();
            });
        }

        function searchCustomer() {
            const query = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('.date-group').forEach(group => {
                let hasVisible = false;
                group.querySelectorAll('.client-card').forEach(card => {
                    const text = card.getAttribute('data-search');
                    if(text.includes(query)) {
                        card.style.display = 'flex';
                        hasVisible = true;
                    } else card.style.display = 'none';
                });
                group.style.display = hasVisible ? 'block' : 'none';
            });
        }

        function exportExcel() {
            if(!currentData) return alert("Không có dữ liệu để xuất!");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "Ngày,Giờ,Mã KH,Họ Tên,SĐT,Cơ Sở\n";
            Object.keys(currentData).forEach(id => {
                const c = currentData[id];
                const ts = parseInt(id.split('_')[1]) || Date.now();
                const d = new Date(ts).toLocaleDateString('vi-VN');
                const mk = id.split('_')[1].slice(-4);
                csvContent += `"${d}","${c.time}","#${mk}","${c.name}","${c.phone}","${br === 'phucyen' ? 'Phúc Yên' : 'Vĩnh Yên'}"\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `PHOTO_NOIR_Report_${new Date().toLocaleDateString('vi-VN')}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        function addLink(clientId) {
            const url = document.getElementById('new_' + clientId).value.trim();
            if(!url) return alert("Chưa có link ảnh!");
            const linkId = "L_" + Date.now();
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) + ' ' + now.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'});
            db.ref('data/' + br + '/' + clientId + '/links/' + linkId).set({ url: url, addedAt: timeStr });
            db.ref('data/' + br + '/' + clientId).update({ status: "completed" });
        }

        function updateLink(clientId, linkId) {
            const newUrl = document.getElementById(`edit_${clientId}_${linkId}`).value.trim();
            if(!newUrl) return alert("Link không được để trống!");
            db.ref('data/' + br + '/' + clientId + '/links/' + linkId).update({ url: newUrl });
            alert("Đã cập nhật link!");
        }

        function deleteLink(clientId, linkId) {
            if(confirm("Bạn muốn xóa link ảnh này?")) db.ref('data/' + br + '/' + clientId + '/links/' + linkId).remove();
        }

        // Xóa từng khách hàng yêu cầu mật khẩu
        function deleteCustomer(clientId, clientName) {
            const pass = prompt("Nhập mật khẩu để xác nhận xóa khách '" + clientName + "':");
            if (pass === MASTER_PASS) {
                db.ref('data/' + br + '/' + clientId).remove()
                .catch((error) => alert("Lỗi: " + error.message));
            } else if (pass !== null) {
                alert("Mật khẩu sai!");
            }
        }

        function clearData() {
            const pass = prompt("DỌN DỮ LIỆU TOÀN BỘ CHI NHÁNH\nNhập mật khẩu xác nhận:");
            if (pass === MASTER_PASS) {
                if(confirm("Tất cả dữ liệu tại chi nhánh này sẽ bị xóa vĩnh viễn. Bạn chắc chắn chứ?")) {
                    db.ref('data/' + br).remove()
                    .then(() => alert("Đã dọn sạch dữ liệu!"))
                    .catch((err) => alert("Lỗi: " + err.message));
                }
            } else if (pass !== null) {
                alert("Mật khẩu sai!");
            }
        }
    </script>
</body>
</html>
