<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Ảnh Của Bạn</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #1557b0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Tiệm Ảnh 📸</h2>
        <div id="ui">
            <p style="color: #666;">Vui lòng nhập tên để nhận link ảnh</p>
            <input type="text" id="nameInput" placeholder="Tên của bạn là gì?">
            <button onclick="start()">Nhận Ảnh Ngay</button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcih83r2AhH85J3Pp31i7qq8OkuRAIyxw",
            authDomain: "tra-anh-khach.firebaseapp.com",
            databaseURL: "https://tra-anh-khach-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tra-anh-khach",
            storageBucket: "tra-anh-khach.firebasestorage.app",
            messagingSenderId: "494071357596",
            appId: "1:494071357596:web:be1a284102ed6176900d59"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function start() {
            const name = document.getElementById('nameInput').value;
            if(!name.trim()) return alert("Bạn hãy nhập tên để mình biết gửi ảnh cho ai nhé!");
            
            const id = "K_" + Date.now();
            db.ref('sessions/' + id).set({ name: name, link: "" });
            
            document.getElementById('ui').innerHTML = `
                <div class="loader"></div>
                <p>Chào <b>${name}</b>, mình đang chuẩn bị ảnh...</p>
                <p style="font-size: 12px; color: #999;">Hệ thống sẽ tự động mở link ảnh khi xong. Vui lòng không đóng trang.</p>
            `;

            db.ref('sessions/' + id + '/link').on('value', (s) => {
                if(s.val()) {
                    window.location.href = s.val(); 
                }
            });
        }
    </script>
</body>
</html>
