<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Ảnh 📸</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.05); width: 100%; max-width: 360px; text-align: center; border: 1px solid #f0f0f0; }
        .logo { width: 90px; height: 90px; object-fit: cover; margin-bottom: 15px; border-radius: 50%; border: 2px solid #f0f0f0; background: #fff; }
        p { color: #666; font-size: 13px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e5e5e5; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
        button.primary-btn { width: 100%; padding: 14px; background: #111; color: #fff; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .album-item { background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .album-info b { font-size: 14px; display: block; color: #333; margin-bottom: 4px;}
        .album-info span { font-size: 12px; color: #888; }
        .link-row { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border: 1px solid #eaeaea; border-radius: 8px; margin-top: 8px; }
        .link-row .time { font-size: 11px; color: #888; }
        .view-btn { background: #111; color: #fff; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .status-msg { font-size: 12px; color: #e67e22; font-weight: 500; margin-top: 10px; display: block; }
        #result-ui { display: none; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <img src="./logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        
        <div id="form-ui">
            <p>Chọn cơ sở và nhập thông tin để xem Album ảnh</p>
            <select id="branch">
                <option value="phucyen">PHOTO NOIR PHÚC YÊN</option>
                <option value="vinhyen">PHOTO NOIR VĨNH YÊN</option>
            </select>
            <input type="text" id="name" placeholder="Họ và tên">
            <input type="tel" id="phone" placeholder="Số điện thoại">
            <button class="primary-btn" onclick="checkData()">Tìm Ảnh Của Tôi</button>
        </div>

        <div id="result-ui">
            <h3 style="font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Lịch sử chụp của bạn</h3>
            <div id="album-list"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; font-size:12px; cursor:pointer; margin-top:20px; width:100%; text-decoration: underline;">← Quay lại</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcih83r2AhH85J3Pp31i7qq8OkuRAIyxw",
            databaseURL: "https://tra-anh-khach-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tra-anh-khach",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkData() {
            const branch = document.getElementById('branch').value;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!name || !phone) return alert("Vui lòng điền đủ Tên và SĐT!");

            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';

            db.ref('data/' + branch).on('value', (snap) => {
                const albumList = document.getElementById('album-list');
                albumList.innerHTML = "";
                let count = 0;

                snap.forEach(child => {
                    const data = child.val();
                    if (data.phone === phone || data.name.toLowerCase() === name.toLowerCase()) {
                        count++;
                        let linksHtml = '';
                        
                        // Kiểm tra nếu có danh sách link
                        if (data.links) {
                            Object.keys(data.links).forEach((linkId, index) => {
                                const l = data.links[linkId];
                                linksHtml += `
                                    <div class="link-row">
                                        <span class="time">${l.addedAt}</span>
                                        <a href="${l.url}" target="_blank" class="view-btn">Xem ảnh ${index + 1}</a>
                                    </div>
                                `;
                            });
                        } else {
                            linksHtml = `<span class="status-msg">Đang chờ Admin tải ảnh lên...</span>`;
                        }

                        const item = document.createElement('div');
                        item.className = 'album-item';
                        item.innerHTML = `
                            <div class="album-info">
                                <b>Yêu cầu lúc: ${data.time}</b>
                                <span>Mã KH: ${child.key.split('_')[1]}</span>
                            </div>
                            <div style="margin-top: 10px;">${linksHtml}</div>
                        `;
                        albumList.appendChild(item);
                    }
                });

                if (count === 0) {
                    const id = "S_" + Date.now();
                    db.ref('data/' + branch + '/' + id).set({
                        name: name, phone: phone, status: "pending", time: new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})
                    });
                    albumList.innerHTML = "<p style='font-size:13px; color:#666; text-align:center; padding: 20px;'>Hệ thống đã ghi nhận. Admin sẽ gửi link ảnh vào đây nhé!</p>";
                }
            });
        }
    </script>
</body>
</html>
