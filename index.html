<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO NOIR SELFBOOTH ALBUM</title>
    <link rel="icon" href="./logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --bg-main: #fafafa; --card-bg: #fff; --text-main: #111; --text-muted: #666; --border-color: #f0f0f0; --btn-bg: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e5e5e5; box-sizing: border-box;}
        .logo { width: 90px; height: 90px; object-fit: cover; border-radius: 50%; border: 1px solid #e5e5e5; padding: 2px; margin-bottom: 15px;}
        
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e5e5e5; border-radius: 12px; box-sizing: border-box; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: 0.2s;}
        input:focus, select:focus { border-color: #111; box-shadow: 0 0 0 3px rgba(17,17,17,0.05);}
        
        button.primary-btn { width: 100%; padding: 16px; background: #111; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; gap: 8px;}
        button.primary-btn:hover:not(:disabled) { background: #333; transform: translateY(-2px);}
        button.primary-btn:active:not(:disabled) { transform: translateY(0);}
        button.primary-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s infinite linear; display: none; margin: 0 auto;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .link-row { display: flex; justify-content: space-between; align-items: center; background: #fafafa; padding: 12px; border: 1px solid #e5e5e5; border-radius: 10px; margin-top: 10px; }
        .view-btn { background: #111; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; text-decoration: none; font-family: 'Inter'; transition: 0.2s;}
        .view-btn:hover { background: #333; }
        
        #result-ui { display: none; text-align: left; }
        .icon-svg { width: 16px; height: 16px; vertical-align: middle; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>
    <div class="card">
        <img src="./logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        
        <div id="form-ui">
            <p style="color: #666; font-size: 13px; margin-bottom: 25px; font-weight: 500;">Vui lòng nhập thông tin để tra cứu Album</p>
            <select id="branch">
                <option value="phucyen">PHOTO NOIR PHÚC YÊN</option>
                <option value="vinhyen">PHOTO NOIR VĨNH YÊN</option>
            </select>
            <input type="text" id="name" placeholder="Họ và tên của bạn">
            <input type="tel" id="phone" placeholder="Số điện thoại" onkeypress="if(event.key === 'Enter') checkData()">
            <button id="btn-submit" class="primary-btn" onclick="checkData()">
                <div class="spinner" id="spinner"></div><span id="btn-text">TRA CỨU</span>
            </button>
        </div>

        <div id="result-ui">
            <h3 style="font-size: 16px; border-bottom: 1px solid #e5e5e5; padding-bottom: 10px; margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;">
                ALBUM CỦA BẠN
                <svg class="icon-svg" style="width:20px;height:20px;" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </h3>
            
            <div id="album-list"></div>
            
            <div style="background: #fff; padding: 15px; border-radius: 12px; margin-top: 25px; border: 1px dashed #d4d4d8;">
                <p style="margin: 0 0 10px 0; font-size: 13px; font-weight: 700; text-transform: uppercase; display:flex; align-items:center; gap:5px;">
                    <svg class="icon-svg" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                    YÊU CẦU IN ẢNH
                </p>
                <div style="display: flex; gap: 10px; margin-bottom: 15px; border: 1px dashed #d4d4d8; padding: 8px 12px; border-radius: 10px; align-items:center; background:#fafafa;">
                    <label for="cFile" style="cursor:pointer; background:#fff; border:1px solid #d4d4d8; padding:8px 14px; border-radius:8px; font-size:12px; font-weight:600; white-space:nowrap; transition:0.2s;">Chọn ảnh</label>
                    <input type="file" id="cFile" multiple accept="image/*" style="display: none;" onchange="document.getElementById('cName').innerText = this.files.length > 0 ? this.files.length + ' tệp đã chọn' : 'Chưa có tệp'">
                    <span id="cName" style="font-size: 12px; color: #666; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Chưa có tệp</span>
                </div>
                <button id="btn-send" onclick="sendToShop()" class="primary-btn" style="padding: 14px; font-size: 13px;">GỬI ẢNH CHO TIỆM</button>
            </div>
            
            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px dashed #e5e5e5; text-align:center;">
                <p style="font-size:13px; font-weight: 500; color: #111; margin-bottom:15px;">Ghé thăm PHOTONOIR tại:</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <a href="#" id="link-fb" target="_blank" style="padding:12px; border:1px solid #e5e5e5; border-radius:10px; text-decoration:none; color:#111; font-size:12px; font-weight:600;">Fanpage</a>
                    <a href="#" id="link-ig" target="_blank" style="padding:12px; border:1px solid #e5e5e5; border-radius:10px; text-decoration:none; color:#111; font-size:12px; font-weight:600;">Instagram</a>
                    <a href="#" id="link-tk" target="_blank" style="padding:12px; border:1px solid #e5e5e5; border-radius:10px; text-decoration:none; color:#111; font-size:12px; font-weight:600;">TikTok</a>
                    <a href="#" id="link-map" target="_blank" style="padding:12px; background:#111; border:1px solid #111; border-radius:10px; text-decoration:none; color:#fff; font-size:12px; font-weight:600;">Đánh giá Maps</a>
                </div>
            </div>

            <button onclick="location.reload()" style="background:none; border:none; color:#888; font-size:13px; font-weight:600; cursor:pointer; margin-top:25px; width:100%; display:flex; align-items:center; justify-content:center; gap:6px;">
                <svg class="icon-svg" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Tra cứu tài khoản khác
            </button>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = 'd47a0ff216df7f718f898c65afa1cc17'; 
        let db;

        try {
            const firebaseConfig = { apiKey: "AIzaSyAcih83r2AhH85J3Pp31i7qq8OkuRAIyxw", databaseURL: "https://tra-anh-khach-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tra-anh-khach" };
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (error) {
            console.error("Firebase init error");
        }

        let currentClientId = null;

        const LINKS = {
            'phucyen': { fb: 'https://www.facebook.com/profile.php?id=61581535177690', ig: 'https://www.instagram.com/photonoirphucyen/', tk: 'https://www.tiktok.com/@photonoir.PY', map: 'https://share.google/1qq6mElCTWSCuK12D' },
            'vinhyen': { fb: 'https://www.facebook.com/profile.php?id=61575627444713#', ig: 'https://www.instagram.com/photonoir.vinhyen/', tk: 'https://www.tiktok.com/@photonoir.vy', map: 'https://share.google/ALz4CDaHAlF9fAlEH' }
        };

        window.onload = () => {
            if(localStorage.getItem('pn_name')) document.getElementById('name').value = localStorage.getItem('pn_name');
            if(localStorage.getItem('pn_phone')) document.getElementById('phone').value = localStorage.getItem('pn_phone');
            if(localStorage.getItem('pn_branch')) document.getElementById('branch').value = localStorage.getItem('pn_branch');
        };

        function showError(msg) {
            if (typeof Swal !== 'undefined') Swal.fire({ icon: 'warning', title: 'Thông báo', text: msg, confirmButtonColor: '#111' });
            else alert(msg);
        }
        
        function getDStr(dObj) { return String(dObj.getDate()).padStart(2, '0') + '/' + String(dObj.getMonth() + 1).padStart(2, '0') + '/' + dObj.getFullYear(); }

        function checkData() {
            if (!db) return showError("Không thể kết nối đến hệ thống. Vui lòng kiểm tra lại mạng!");

            const branch = document.getElementById('branch').value;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!name && !phone) return showError("Vui lòng nhập Họ tên hoặc Số điện thoại.");

            localStorage.setItem('pn_name', name);
            localStorage.setItem('pn_phone', phone);
            localStorage.setItem('pn_branch', branch);

            document.getElementById('spinner').style.display = 'block';
            document.getElementById('btn-text').innerText = '';
            document.getElementById('btn-submit').disabled = true;

            const todayStr = getDStr(new Date());

            db.ref('data/' + branch).once('value', (snap) => {
                let foundData = null;

                snap.forEach(child => {
                    const data = child.val();
                    const ts = parseInt(child.key.split('_')[1]) || Date.now();
                    const dStr = getDStr(new Date(ts));
                    
                    // Lọc theo SĐT và phải CÙNG NGÀY HÔM NAY
                    if (data.phone === phone && dStr === todayStr) {
                        foundData = data;
                        foundData.id = child.key;
                    }
                });

                if (foundData) {
                    renderData(foundData, branch);
                } else {
                    // NẾU KHÔNG CÓ THÌ TẠO PHIÊN MỚI TRÊN FIREBASE
                    const newId = "S_" + Date.now();
                    const newData = {
                        name: name || "Khách hàng",
                        phone: phone,
                        status: "new",
                        time: new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})
                    };
                    
                    db.ref('data/' + branch + '/' + newId).set(newData).then(() => {
                        newData.id = newId;
                        renderData(newData, branch);
                    });
                }
            }).catch(error => {
                showError("Lỗi kết nối máy chủ. Vui lòng thử lại.");
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('btn-text').innerText = 'TRA CỨU';
                document.getElementById('btn-submit').disabled = false;
            });
        }

        function renderData(data, branch) {
            currentClientId = data.id;
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';

            document.getElementById('link-fb').href = LINKS[branch].fb;
            document.getElementById('link-ig').href = LINKS[branch].ig;
            document.getElementById('link-tk').href = LINKS[branch].tk;
            document.getElementById('link-map').href = LINKS[branch].map;

            const ts = parseInt(data.id.split('_')[1]) || Date.now();
            const dateStr = getDStr(new Date(ts));

            let html = `<div style="padding: 18px; background: #fafafa; border: 1px solid #e5e5e5; border-radius: 14px; position:relative;">
                <div style="position: absolute; top: 15px; right: 15px; border: 1px solid #e5e5e5; padding: 2px 6px; border-radius: 4px; background: #fff; font-size: 11px; font-family: monospace; color: #888;">#${data.id.split('_')[1].slice(-4)}</div>
                <div style="font-size: 14px; color: #111; margin-bottom: 12px;">Ngày chụp: <b>${dateStr}</b></div>`;

            if (data.links && Object.keys(data.links).length > 0) {
                Object.keys(data.links).forEach((linkId, index) => {
                    const l = data.links[linkId];
                    html += `<div class="link-row"><span style="font-size:12px; color:#666; font-weight:600;">Ảnh gốc ${index+1}</span><a href="${l.url}" target="_blank" class="view-btn" onclick="askRating('${branch}')">Lưu ảnh</a></div>`;
                });
            } else {
                html += `<div style="font-size:12px; color:#888; text-align:center; padding:15px; background:#fff; border:1px dashed #d4d4d8; border-radius:8px; margin-top:10px;">
                    <div style="width: 8px; height: 8px; background: #111; border-radius: 50%; animation: pulse 1.5s infinite; display:inline-block; margin-right:5px;"></div>
                    Đang đồng bộ ảnh...
                </div>`;
            }

            if (data.client_uploads && Object.keys(data.client_uploads).length > 0) {
                html += `<div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e5e5e5;"><b style="font-size: 12px; color: #111; text-transform: uppercase;">Ảnh bạn đã yêu cầu in:</b>`;
                Object.keys(data.client_uploads).forEach((uploadId) => {
                    const u = data.client_uploads[uploadId];
                    html += `<div class="link-row" style="background: #fff;"><span style="font-size:12px; color:#666;">Gửi lúc: ${u.time}</span><span style="font-size: 12px; color: #111; font-weight: 600;">${u.links.length} ảnh</span></div>`;
                });
                html += `</div>`;
            }

            html += `</div>`;
            document.getElementById('album-list').innerHTML = html;

            document.getElementById('spinner').style.display = 'none';
            document.getElementById('btn-text').innerText = 'TRA CỨU ALBUM';
            document.getElementById('btn-submit').disabled = false;
        }

        async function sendToShop() {
            const files = document.getElementById('cFile').files;
            if (files.length === 0) return showError("Vui lòng chọn ảnh cần in.");
            if (!currentClientId) return showError("Không tìm thấy phiên chụp.");
            
            const btn = document.getElementById('btn-send');
            btn.innerHTML = `<div class="spinner" style="display:block; border-top-color:#111; border-color: rgba(0,0,0,0.1);"></div> ĐANG TẢI LÊN...`;
            btn.style.background = "#fff"; btn.style.color = "#111"; btn.style.border = "1px solid #111";
            btn.disabled = true;

            const branch = document.getElementById('branch').value;

            try {
                let uploadedUrls = [];
                for (let i = 0; i < files.length; i++) {
                    const formData = new FormData(); formData.append("image", files[i]);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const resData = await response.json();
                    if (resData.success) uploadedUrls.push(resData.data.url);
                }
                
                await db.ref('data/' + branch + '/' + currentClientId + '/client_uploads/U_' + Date.now()).set({ 
                    time: new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) + ' ' + new Date().toLocaleDateString('vi-VN'), 
                    links: uploadedUrls 
                });
                
                if(typeof Swal !== 'undefined') Swal.fire({title: 'Hoàn tất', text: 'Yêu cầu in ảnh đã được gửi đến tiệm.', icon: 'success', confirmButtonColor: '#111'});
                else alert("Đã gửi yêu cầu in ảnh thành công!");
                
                document.getElementById('cFile').value = "";
                document.getElementById('cName').innerText = "Chưa có tệp";
                
                // Refresh list
                checkData();
            } catch (error) {
                showError("Không thể tải ảnh. Kiểm tra lại kết nối mạng!");
            } finally {
                btn.innerHTML = `GỬI ẢNH CHO TIỆM`;
                btn.style.background = "#111"; btn.style.color = "#fff"; btn.style.border = "none";
                btn.disabled = false;
            }
        }

        function askRating(br) {
            if (localStorage.getItem('pn_rated')) return;
            setTimeout(() => {
                if(typeof Swal !== 'undefined') {
                    Swal.fire({
                        title: 'Đánh giá dịch vụ', text: 'Tặng tiệm 5 sao trên Google Maps để ủng hộ PHOTONOIR bạn nhé!', icon: 'info',
                        showCancelButton: true, confirmButtonText: 'Đánh giá ngay', cancelButtonText: '<span style="color:#111">Để sau</span>', confirmButtonColor: '#111', cancelButtonColor: '#fff'
                    }).then(r => { if(r.isConfirmed) { localStorage.setItem('pn_rated', '1'); window.open(LINKS[br].map, '_blank'); }});
                }
            }, 2000);
        }
    </script>
</body>
</html>
