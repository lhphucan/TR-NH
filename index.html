<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO NOIR SELFBOOTH ALBUM</title>
    <link rel="icon" href="./logo.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --bg-main: #fafafa; --card-bg: #fff; --text-main: #111; --text-muted: #666; --border-color: #f0f0f0; --input-bg: #fdfdfd; --input-border: #e5e5e5; --btn-bg: #111; --btn-text: #fff; --item-bg: #f9f9f9; --link-bg: #fff; --social-border: #eaeaea; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); position: relative; box-sizing: border-box;}
        .logo { width: 90px; height: 90px; object-fit: cover; margin-bottom: 15px; border-radius: 50%; border: 1px solid var(--border-color); background: #fff; padding: 2px; }
        p { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5; }
        
        select, input[type="text"], input[type="tel"] { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid var(--input-border); border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; background: var(--input-bg); color: var(--text-main); transition: 0.2s; }
        select:focus, input:focus { border-color: var(--text-main); box-shadow: 0 0 0 3px rgba(17,17,17,0.05); }
        
        button.primary-btn { width: 100%; padding: 16px; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 8px; letter-spacing: 0.5px;}
        button.primary-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        button.primary-btn:active:not(:disabled) { transform: translateY(0); }
        button.primary-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: transparent; animation: spin 0.8s ease-in-out infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .album-item { background: var(--item-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 18px; margin-bottom: 15px; text-align: left; animation: fadeIn 0.5s ease; position: relative;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .album-info b { font-size: 14px; display: block; color: var(--text-main); margin-bottom: 4px; }
        .album-info span { font-size: 12px; color: var(--text-muted); }
        
        .link-row { display: flex; justify-content: space-between; align-items: center; background: var(--link-bg); padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; margin-top: 10px; transition: 0.2s; }
        .link-row:hover { border-color: #ccc; }
        .link-row .time { font-size: 12px; color: var(--text-muted); font-weight: 500; font-family: 'Inter';}
        .view-btn { background: var(--btn-bg); color: var(--btn-text); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; transition: 0.2s;}
        .view-btn:hover { background: #fff; color: #111; border: 1px solid #111;}
        
        .marketing-box { margin-top: 25px; padding-top: 20px; border-top: 1px dashed var(--border-color); animation: fadeIn 0.6s ease; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .social-btn { display: flex; justify-content: center; align-items: center; padding: 12px 10px; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600; border: 1px solid var(--social-border); transition: 0.2s; background: var(--input-bg); color: var(--text-main); gap: 5px;}
        .social-btn:hover { border-color: var(--text-main); background: #f4f4f5; }
        
        .icon-svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        
        #result-ui { display: none; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <img src="./logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        
        <div id="form-ui">
            <p>Vui lòng nhập thông tin để tra cứu Album</p>
            <select id="branch">
                <option value="phucyen">PHOTO NOIR PHÚC YÊN</option>
                <option value="vinhyen">PHOTO NOIR VĨNH YÊN</option>
            </select>
            <input type="text" id="name" placeholder="Họ và tên của bạn">
            <input type="tel" id="phone" placeholder="Số điện thoại" onkeypress="if(event.key === 'Enter') checkData()">
            <button id="btn-submit" class="primary-btn" onclick="checkData()">
                <div class="spinner" id="spinner"></div>
                <span id="btn-text">TRA CỨU</span>
            </button>
        </div>

        <div id="result-ui">
            <h3 style="font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center;">
                ALBUM CỦA BẠN 
                <svg class="icon-svg" style="width:20px;height:20px;" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </h3>
            <div id="album-list"></div>
            
            <div style="background: #fff; padding: 15px; border-radius: 12px; margin-top: 25px; border: 1px dashed #d4d4d8;">
                <p style="margin: 0 0 10px 0; font-size: 13px; font-weight: 600; color: #111; display:flex; align-items:center; gap:5px; text-transform: uppercase;">
                    <svg class="icon-svg" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                    YÊU CẦU IN ẢNH
                </p>
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: #fff; border: 1px dashed #d4d4d8; padding: 8px 12px; border-radius: 10px;">
                    <label for="customerFile" style="cursor: pointer; background: #fafafa; border: 1px solid #d4d4d8; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #111; white-space: nowrap; transition: 0.2s;">Chọn ảnh</label>
                    <input type="file" id="customerFile" multiple accept="image/*" style="display: none;" onchange="document.getElementById('c-fname').innerText = this.files.length > 0 ? this.files.length + ' tệp đã chọn' : 'Chưa có tệp'">
                    <span id="c-fname" style="font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; font-family: 'Inter';">Chưa có tệp</span>
                </div>
                <button id="btn-send-shop" onclick="sendToShop()" style="width: 100%; padding: 12px; background: #111; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    GỬI ẢNH CHO TIỆM
                </button>
            </div>

            <div class="marketing-box" id="marketing-box" style="display:none;">
                <p style="text-align:center; font-size:13px; margin:0; font-weight: 500; color: var(--text-main);">Ghé thăm cơ sở <span id="ten-coso" style="font-weight:700;"></span> tại:</p>
                <div class="social-grid">
                    <a href="#" id="link-fb" target="_blank" class="social-btn fb">Fanpage</a>
                    <a href="#" id="link-ig" target="_blank" class="social-btn ig">Instagram</a>
                    <a href="#" id="link-tk" target="_blank" class="social-btn tk">TikTok</a>
                    <a href="#" id="link-map" target="_blank" class="social-btn gg" style="background:#111; color:#fff; border-color:#111;">
                        <svg class="icon-svg" style="width:14px;height:14px;fill:currentColor;" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        Đánh giá
                    </a>
                </div>
            </div>

            <button onclick="location.reload()" style="background:none; border:none; color:var(--text-muted); font-size:13px; cursor:pointer; margin-top:25px; width:100%; font-weight: 500; display:flex; align-items:center; justify-content:center; gap:5px;">
                <svg class="icon-svg" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Tra cứu tài khoản khác
            </button>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = 'd47a0ff216df7f718f898c65afa1cc17'; 

        const firebaseConfig = { apiKey: "AIzaSyAcih83r2AhH85J3Pp31i7qq8OkuRAIyxw", databaseURL: "https://tra-anh-khach-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tra-anh-khach" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentClientId = null;

        const LINKS = {
            'phucyen': { name: 'Phúc Yên', fb: 'https://www.facebook.com/profile.php?id=61581535177690', ig: 'https://www.instagram.com/photonoirphucyen/', tk: 'https://www.tiktok.com/@photonoir.PY', map: 'https://share.google/1qq6mElCTWSCuK12D' },
            'vinhyen': { name: 'Vĩnh Yên', fb: 'https://www.facebook.com/profile.php?id=61575627444713#', ig: 'https://www.instagram.com/photonoir.vinhyen/', tk: 'https://www.tiktok.com/@photonoir.vy', map: 'https://share.google/ALz4CDaHAlF9fAlEH' }
        };

        window.onload = () => {
            if(localStorage.getItem('pn_name')) document.getElementById('name').value = localStorage.getItem('pn_name');
            if(localStorage.getItem('pn_phone')) document.getElementById('phone').value = localStorage.getItem('pn_phone');
            if(localStorage.getItem('pn_branch')) document.getElementById('branch').value = localStorage.getItem('pn_branch');
        };

        function checkData() {
            const branch = document.getElementById('branch').value;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!name && !phone) {
                Swal.fire({ icon: 'warning', title: 'Thiếu thông tin', text: 'Vui lòng nhập Tên hoặc Số điện thoại.', confirmButtonColor: '#111' });
                return;
            }

            const btn = document.getElementById('btn-submit');
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('btn-text').innerText = 'ĐANG TÌM KIẾM...';
            btn.disabled = true;

            localStorage.setItem('pn_name', name);
            localStorage.setItem('pn_phone', phone);
            localStorage.setItem('pn_branch', branch);

            setTimeout(() => {
                document.getElementById('form-ui').style.display = 'none';
                document.getElementById('result-ui').style.display = 'block';

                document.getElementById('ten-coso').innerText = LINKS[branch].name;
                document.getElementById('link-fb').href = LINKS[branch].fb;
                document.getElementById('link-ig').href = LINKS[branch].ig;
                document.getElementById('link-tk').href = LINKS[branch].tk;
                document.getElementById('link-map').href = LINKS[branch].map;
                document.getElementById('marketing-box').style.display = 'block';

                db.ref('data/' + branch).once('value', (snap) => {
                    const albumList = document.getElementById('album-list');
                    albumList.innerHTML = "";
                    let count = 0;

                    snap.forEach(child => {
                        const data = child.val();
                        let isMatch = false;

                        if (phone && data.phone === phone) isMatch = true;
                        if (name && data.name && data.name.toLowerCase() === name.toLowerCase()) isMatch = true;

                        if (isMatch) {
                            count++;
                            currentClientId = child.key;

                            let linksHtml = '';
                            if (data.links) {
                                Object.keys(data.links).forEach((linkId, index) => {
                                    const l = data.links[linkId];
                                    linksHtml += `<div class="link-row"><span class="time">Ảnh gốc ${index + 1}</span><a href="${l.url}" target="_blank" class="view-btn" onclick="askRating('${branch}')">Lưu ảnh</a></div>`;
                                });
                            } else {
                                linksHtml = `<div style="background: #fafafa; border-radius: 8px; padding: 12px; margin-top: 10px; border: 1px dashed #d4d4d8; display: flex; align-items: center; gap: 8px;"><div style="width: 8px; height: 8px; background: #111; border-radius: 50%; animation: pulse 1.5s infinite;"></div><span style="font-size: 12px; color: #666; font-weight: 500;">Đang đồng bộ ảnh...</span></div>`;
                            }
                            const item = document.createElement('div');
                            item.className = 'album-item';
                            item.innerHTML = `<div style="position: absolute; top: 15px; right: 15px; border: 1px solid #e5e5e5; padding: 2px 6px; border-radius: 4px; background: #fafafa; font-size: 11px; font-family: monospace; color: #888;">#${child.key.split('_')[1].slice(-4)}</div><div class="album-info"><b>Giờ chụp: ${data.time}</b></div><div style="margin-top: 10px;">${linksHtml}</div>`;
                            albumList.appendChild(item);
                        }
                    });

                    if (count === 0) {
                        const id = "S_" + Date.now();
                        currentClientId = id;
                        db.ref('data/' + branch + '/' + id).set({ name: name || "Khách hàng", phone: phone || "", status: "pending", time: new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) });
                        albumList.innerHTML = `
                            <div style='text-align:center; padding: 30px 10px; background: #f4f4f5; border-radius: 16px; border: 1px solid #e5e5e5;'>
                                <svg class="icon-svg" style="width:40px;height:40px; stroke:#a1a1aa; margin-bottom:10px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                <br><b style='font-size:15px; color:#111;'>Đã tạo phiên chụp!</b>
                                <p style='font-size:13px; color:#666; margin-top:8px; line-height: 1.5;'>Vui lòng đợi tới lượt bạn nhé.</p>
                            </div>`;
                    }
                    
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('btn-text').innerText = 'TRA CỨU ALBUM';
                    btn.disabled = false;
                });
            }, 800);
        }

        async function sendToShop() {
            const fileInput = document.getElementById('customerFile');
            const files = fileInput.files;
            const btn = document.getElementById('btn-send-shop');
            const branch = document.getElementById('branch').value;

            if (files.length === 0) return Swal.fire({title: 'Chưa có tệp', text: 'Vui lòng chọn ảnh từ thiết bị.', icon: 'warning', confirmButtonColor: '#111'});
            if (!currentClientId) return Swal.fire({title: 'Lỗi', text: 'Không tìm thấy thẻ khách hàng.', icon: 'error', confirmButtonColor: '#111'});

            btn.innerHTML = `<div class="spinner" style="display:block; border-top-color:#111; border-color: rgba(0,0,0,0.1);"></div> ĐANG XỬ LÝ...`;
            btn.style.background = "#fff"; btn.style.color = "#111"; btn.style.border = "1px solid #111";
            btn.disabled = true;

            try {
                let uploadedUrls = [];
                for (let i = 0; i < files.length; i++) {
                    const formData = new FormData(); formData.append("image", files[i]);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.success) uploadedUrls.push(data.data.url);
                }
                
                await db.ref('data/' + branch + '/' + currentClientId + '/client_uploads/U_' + Date.now()).set({ 
                    time: new Date().toLocaleString('vi-VN'), 
                    links: uploadedUrls 
                });
                
                Swal.fire({title: 'Hoàn tất', text: 'Yêu cầu in ảnh đã được gửi đến tiệm.', icon: 'success', confirmButtonColor: '#111'});
                fileInput.value = "";
                document.getElementById('c-fname').innerText = 'Chưa có tệp';
            } catch (error) {
                Swal.fire({title: 'Lỗi kết nối', text: 'Vui lòng thử lại sau.', icon: 'error', confirmButtonColor: '#111'});
            } finally {
                btn.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> GỬI ẢNH CHO TIỆM`;
                btn.style.background = "#111"; btn.style.color = "#fff"; btn.style.border = "none";
                btn.disabled = false;
            }
        }

        function askRating(br) {
            if (localStorage.getItem('pn_rated')) return;
            setTimeout(() => {
                Swal.fire({
                    title: 'Đánh giá dịch vụ', text: 'Tặng tiệm 5 sao trên Google Maps để ủng hộ PHOTONOIR bạn nhé!', icon: 'info',
                    showCancelButton: true, confirmButtonText: 'Đánh giá ngay', cancelButtonText: '<span style="color:#111">Để sau</span>', confirmButtonColor: '#111', cancelButtonColor: '#fff'
                }).then(r => { if(r.isConfirmed) { localStorage.setItem('pn_rated', '1'); window.open(LINKS[br].map, '_blank'); }});
            }, 2000);
        }
    </script>
</body>
</html>
